resilience4j:
  circuitbreaker:
    instances:
      mockApi:
        slidingWindowSize: 20  # 최근 20건 중
        minimumNumberOfCalls: 10  # 최소 10건 이상 호출이 쌓였을때
        failureRateThreshold: 50  # 실패율이 50% 넘어가면 오픈
        waitDurationInOpenState: 10s  # 오픈 상태 10초 유지
        permittedNumberOfCallsInHalfOpenState: 5 # half-open에서 5건 실험 호출
  timelimiter:
    instances:
      mockApi:
        timeoutDuration: 1s
        cancelRunningFuture: true

mock-api:
  base-url: http://localhost:8081
  send-path: /mock/send
  connect-timeout-ms: 1000
  read-timeout-ms: 3000

secondary-mock-api:
  base-url: http://localhost:8082 # 일단 mock 서버로
  send-path: /mock/send
  connect-timeout-ms: 1000
  read-timeout-ms: 3000
